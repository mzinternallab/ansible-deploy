# RKE2 roles — new nodes are worker agents
rke2_agents:
  hosts:
    eaglei-wn-test-04.ornl.gov: {}
    # eaglei-wn-prod-04.ornl.gov: {}
    # eaglei-wn-prod-05.ornl.gov: {}

rke2_cluster:
  children:
    rke2_agents: {}

# Bootstrap targets — servers that will be reinstalled when bootstrap.yaml is run
# WARNING: any host in this group will have its OS wiped on next bootstrap run
bootstrap_targets:
  hosts:
    eaglei-wn-test-04.ornl.gov: {}
    # eaglei-wn-prod-04.ornl.gov: {}
    # eaglei-wn-prod-05.ornl.gov: {}

# Hardware spec — all 3 new nodes are R760, same spec
hwspec_r760:
  hosts:
    eaglei-wn-test-04.ornl.gov: {}
    # eaglei-wn-prod-04.ornl.gov: {}
    # eaglei-wn-prod-05.ornl.gov: {}

# Use root password for initial connection (before doesadm is configured)
uses_root_pw:
  hosts:
    eaglei-wn-test-04.ornl.gov: {}
    # eaglei-wn-prod-04.ornl.gov: {}
    # eaglei-wn-prod-05.ornl.gov: {}
  vars:
    ansible_ssh_user: root
    ansible_ssh_pass: "{{ lookup('hashi_vault', 'secret=secret/data/doesadm:password', ca_cert=lookup('env','VAULT_CACERT'))}}"

# Environment separation
test_nodes:
  hosts:
    eaglei-wn-test-04.ornl.gov: {}

